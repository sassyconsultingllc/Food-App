groups:
  - name: ragg.rules
    rules:
      - alert: RAGJobFailureRateHigh
        expr: |
          (sum(rate(ragg_job_failed_total[5m])) / sum(rate(ragg_job_processed_total[5m]))) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High failure rate for RAG jobs"
          description: "More than 5% of RAG jobs have failed in the last 5 minutes. Investigate job errors and underlying services (Pushgateway/Redis/Chroma)."
          runbook: "Investigate RAG job failures: check logs, job retries, and upstream services."

      - alert: RAGJobHighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(ragg_job_duration_seconds_bucket[5m])) by (le)) > 5
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "High latency for RAG jobs (P95 > 5s)"
          description: "95th percentile job latency for RAG jobs exceeds 5 seconds for 10 minutes. This may indicate slow external calls (LLM, embeddings) or queue backlog."
          runbook: "Review job latency, instrument slower stages, and consider scaling worker concurrency or batching."
