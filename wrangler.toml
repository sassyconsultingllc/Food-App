name = "foodie-finder-api"
main = "worker/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "d5ccd0d80780f2d0ab72ab12b15244e2"

[observability]
enabled = true

# =============================================================================
# D1 Database - Structured data storage
# =============================================================================
[[d1_databases]]
binding = "DB"
database_name = "foodie-finder"
database_id = "bd8b5812-e9a0-4568-a66c-595828e11611"

# =============================================================================
# Vectorize - Semantic search index
# =============================================================================
[[vectorize]]
binding = "VECTORIZE"
index_name = "foodie-finder-restaurants"

# =============================================================================
# Workers AI - For generating embeddings
# =============================================================================
[ai]
binding = "AI"

# =============================================================================
# R2 Bucket - Menu photo storage
# =============================================================================
[[r2_buckets]]
binding = "MENU_PHOTOS"
bucket_name = "foodie-finder-menus"

# =============================================================================
# KV Namespaces
# =============================================================================
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "60b92d22885449588e7edeb401c1e66f"

[[kv_namespaces]]
binding = "FOODIE_PUBLIC_NOTES"
id = "f58d8de66b624373b3f316b839c7bfcf"

[vars]
NODE_ENV = "production"
VITE_APP_ID = "foodie-finder"

# Secrets (set via: wrangler secret put <n>)
# - GOOGLE_PLACES_API_KEY
# - FOURSQUARE_API_KEY
# - HERE_API_KEY
# - JWT_SECRET

# =============================================================================
# Production Environment
# =============================================================================
[env.production]
name = "foodie-finder-api-prod"
workers_dev = false
route = { pattern = "foodie-finder.sassyconsultingllc.com/*", zone_name = "sassyconsultingllc.com" }

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT"
id = "60b92d22885449588e7edeb401c1e66f"

[[env.production.d1_databases]]
binding = "DB"
database_name = "foodie-finder"
database_id = "bd8b5812-e9a0-4568-a66c-595828e11611"

[[env.production.vectorize]]
binding = "VECTORIZE"
index_name = "foodie-finder-restaurants"

[env.production.ai]
binding = "AI"

[[env.production.r2_buckets]]
binding = "MENU_PHOTOS"
bucket_name = "foodie-finder-menus"

[[env.production.kv_namespaces]]
binding = "FOODIE_PUBLIC_NOTES"
id = "f58d8de66b624373b3f316b839c7bfcf"

# Top-level [vars] are NOT inherited by environments in wrangler — each
# env must re-declare them or the prod worker gets no NODE_ENV/VITE_APP_ID.
[env.production.vars]
NODE_ENV = "production"
VITE_APP_ID = "foodie-finder"

# =============================================================================
# Preview Environment
# =============================================================================
[env.preview]
name = "foodie-finder-api-preview"
workers_dev = true

[[env.preview.kv_namespaces]]
binding = "RATE_LIMIT"
id = "60b92d22885449588e7edeb401c1e66f"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "foodie-finder"
database_id = "bd8b5812-e9a0-4568-a66c-595828e11611"

[[env.preview.vectorize]]
binding = "VECTORIZE"
index_name = "foodie-finder-restaurants"

[env.preview.ai]
binding = "AI"

[[env.preview.r2_buckets]]
binding = "MENU_PHOTOS"
bucket_name = "foodie-finder-menus"

[[env.preview.kv_namespaces]]
binding = "FOODIE_PUBLIC_NOTES"
id = "f58d8de66b624373b3f316b839c7bfcf"

[env.preview.vars]
NODE_ENV = "preview"
VITE_APP_ID = "foodie-finder"
