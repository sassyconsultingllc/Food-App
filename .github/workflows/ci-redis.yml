name: CI (Redis)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

      pushgateway:
        image: prom/pushgateway:v1.5.0
        ports:
          - 9091:9091
        options: >-
          --health-cmd "curl -f http://127.0.0.1:9091/metrics || exit 1" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install

      - name: Wait for Redis
        run: |
          for i in {1..15}; do
            if redis-cli -h 127.0.0.1 ping | grep -q PONG; then
              echo "Redis is up" && break
            fi
            echo "Waiting for Redis..."; sleep 2
          done

      - name: Wait for Pushgateway
        run: |
          for i in {1..15}; do
            if curl -sSf http://127.0.0.1:9091/metrics >/dev/null 2>&1; then
              echo "Pushgateway is up" && break
            fi
            echo "Waiting for Pushgateway..."; sleep 2
          done

      - name: Run tests
        env:
          REDIS_URL: redis://127.0.0.1:6379
          PUSHGATEWAY_URL: http://127.0.0.1:9091
        run: pnpm test
